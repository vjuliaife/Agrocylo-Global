name: CI

# Scoped to the Next.js client. Server and Soroban contracts are owned by
# other team members; they should add their own jobs to this workflow (or a
# sibling workflow) when ready.

on:
  pull_request:
    paths:
      - "client/**"
      - "server/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - "server/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  client:
    name: Client · Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Next.js types
        run: node -e "require('fs').writeFileSync('next-env.d.ts','/// <reference types=\"next\" />\n/// <reference types=\"next/image-types/global\" />\n\n// NOTE: This file should not be edited\n// see https://nextjs.org/docs/basic-features/typescript for more information.\n')"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  server:
    name: Server · Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test:coverage
