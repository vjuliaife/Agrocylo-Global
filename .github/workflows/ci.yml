name: CI

# Scoped to the Next.js client. Server and Soroban contracts are owned by
# other team members; they should add their own jobs to this workflow (or a
# sibling workflow) when ready.

on:
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  client:
    name: Client · Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
