version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agrocylo-postgres
    environment:
      POSTGRES_USER: agrocylo
      POSTGRES_PASSWORD: agrocylo123
      POSTGRES_DB: agrocylo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrocylo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agrocylo-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agrocylo-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://agrocylo:agrocylo123@postgres:5432/agrocylo_db
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src:cached
      - ./server/prisma:/app/prisma:cached

volumes:
  postgres_data:
  redis_data:
